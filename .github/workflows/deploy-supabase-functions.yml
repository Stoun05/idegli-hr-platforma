name: Deploy Supabase Functions

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate deployment secrets
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_ID repository secrets are required."
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Deploy secure application function
        run: supabase functions deploy submit-application --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy candidate profile function
        run: supabase functions deploy portal-profile --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy HR notification function
        run: supabase functions deploy notify-hr --project-ref "$SUPABASE_PROJECT_ID"
